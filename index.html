<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .footer {
        background: #7e8082;
        padding: 10px;
      }

      .footer-icons {
        padding: 15px 20px;
        border-bottom: 1px solid rgb(255, 255, 255);
      }

      .bar-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #fff;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        .footer-icons {
          flex-direction: column;
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="footer">
      <div class="container">
        <div class="footer-icons d-flex justify-content-between">
          <div class="bar-item">
            <img width="42" height="42" src="assets/price.png" alt="" />
            تضمین بهترین قیمت
          </div>

          <div class="bar-item">
            <img width="42" height="42" src="assets/storage.png" alt="" />
            دریافت بسته با مراجعه حضوری
          </div>

          <div class="bar-item">
            <img width="42" height="42" src="assets/cart.png" alt="" />
            پرداخت آنلاین و کارت به کارت
          </div>

          <div class="bar-item">
            <img width="42" height="42" src="assets/guarantee.png" alt="" />
            ضمانت و اصالت کالا
          </div>

          <div class="bar-item">
            <img width="42" height="42" src="assets/truck.png" alt="" />
            ارسال سریع سفارشات
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
